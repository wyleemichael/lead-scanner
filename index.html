<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lead Scanner">
  <link rel="apple-touch-icon" href="icon.png">
  <title>MYSIR ASM 2026 – Lead Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #00AEEF;
      --yellow:  #F5C200;
      --dark:    #1a1a2e;
      --navy:    #0d1b3e;
      --bg:      #f0f4f8;
      --surface: #ffffff;
      --card:    #f7f9fc;
      --border:  #dce3ed;
      --text:    #1a1a2e;
      --muted:   #6b7a99;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }

    .view { display: none; flex-direction: column; min-height: 100vh; }
    .view.active { display: flex; }

    /* Header */
    .header {
      background: var(--navy);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      border-bottom: 3px solid var(--yellow);
      min-height: 60px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { height: 36px; width: auto; }
    .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
    .header-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
    .header-title span { color: var(--yellow); display: block; font-size: 11px; font-weight: 600; }
    .header-vendor { font-size: 11px; color: var(--blue); font-weight: 500; margin-top: 2px; }

    /* Nav */
    .nav {
      display: flex;
      background: var(--navy);
      border-top: 2px solid var(--yellow);
      position: fixed; bottom: 0; left: 0; right: 0;
    }
    .nav-btn {
      flex: 1; padding: 11px 0 9px;
      background: none; border: none;
      color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: color .2s; letter-spacing: .3px;
    }
    .nav-btn.active { color: var(--yellow); }
    .nav-btn svg { width: 20px; height: 20px; }
    .badge {
      background: var(--blue); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 20px; margin-left: 4px;
    }

    /* Login */
    #loginView {
      background: linear-gradient(160deg, var(--navy) 0%, #0a2a5e 60%, #003f6b 100%);
      justify-content: center; align-items: center; padding: 32px 20px;
      min-height: 100vh;
    }
    .login-box {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 28px;
      backdrop-filter: blur(10px);
    }
    .login-logo-area { text-align: center; margin-bottom: 28px; }
    .login-logo-area img { height: 64px; width: auto; margin-bottom: 14px; }
    .login-event-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 800;
      color: var(--blue); letter-spacing: .5px;
      text-transform: uppercase;
    }
    .login-subtitle {
      font-size: 11px; color: rgba(255,255,255,0.5);
      margin-top: 4px; font-weight: 500;
    }
    .login-divider {
      height: 2px; width: 40px;
      background: var(--yellow);
      margin: 14px auto;
    }
    .login-section-title {
      font-size: 15px; font-weight: 600; color: #fff;
      text-align: center; margin-bottom: 20px;
    }

    label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      padding: 12px 14px;
      font-size: 14px; font-family: 'Poppins', sans-serif;
      outline: none; transition: border-color .2s;
      margin-bottom: 16px;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus { border-color: var(--blue); }

    .btn {
      width: 100%; padding: 13px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
      font-family: 'Poppins', sans-serif;
      letter-spacing: .3px;
    }
    .btn:hover { opacity: .88; }
    .btn:active { opacity: .72; }
    .btn-primary  { background: linear-gradient(135deg, var(--blue), #0090c8); color: #fff; }
    .btn-secondary{ background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-success  { background: linear-gradient(135deg, #00b894, #00907a); color: #fff; }
    .btn-small    { width: auto; padding: 7px 14px; font-size: 12px; }
    .btn-outline  { background: transparent; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }
    .btn-outline:hover { border-color: var(--yellow); color: var(--yellow); }

    #loginError {
      background: rgba(248,113,113,.12);
      border: 1px solid rgba(248,113,113,.35);
      border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #fca5a5;
      margin-bottom: 16px; display: none;
    }

    /* Scanner */
    #scannerView { padding-bottom: 68px; background: var(--bg); }
    .scanner-content { flex: 1; padding: 16px; }

    #reader {
      width: 100%; max-width: 420px; margin: 0 auto;
      border-radius: var(--radius); overflow: hidden;
      background: var(--dark);
      border: 2px solid var(--blue);
      box-shadow: 0 0 0 4px rgba(0,174,239,0.1);
    }
    #reader video { width: 100% !important; }
    #reader img { display: none !important; }

    .scan-hint {
      text-align: center; color: var(--muted); font-size: 13px;
      padding: 12px 0; max-width: 420px; margin: 0 auto;
    }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px; margin: 14px auto;
      max-width: 420px; display: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .result-card.show { display: block; }
    .result-card.success { border-left: 4px solid #00b894; }
    .result-card.error   { border-left: 4px solid #f87171; }
    .result-card.warn    { border-left: 4px solid var(--yellow); }

    .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .result-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-green  { background: #00b894; }
    .dot-red    { background: #f87171; }
    .dot-yellow { background: var(--yellow); }
    .result-header h3 { font-size: 15px; font-weight: 600; color: var(--text); }
    .result-header p  { font-size: 12px; color: var(--muted); }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field.full { grid-column: 1 / -1; }
    .field-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
    .field-value { font-size: 13px; font-weight: 500; color: var(--text); word-break: break-word; }
    .result-actions { display: flex; gap: 10px; }
    .result-actions .btn { flex: 1; }

    .manual-section { max-width: 420px; margin: 8px auto 0; }
    .manual-toggle { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 8px 0; text-decoration: underline; display: block; margin: 0 auto; font-family: 'Poppins', sans-serif; }
    .manual-input-row { display: none; gap: 8px; margin-top: 8px; }
    .manual-input-row.show { display: flex; }
    .manual-input-row input { margin-bottom: 0; flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .manual-input-row input::placeholder { color: var(--muted); }
    .manual-input-row input:focus { border-color: var(--blue); }

    /* Leads */
    #leadsView { padding-bottom: 68px; background: var(--bg); }
    .leads-content { flex: 1; padding: 16px; }
    .leads-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .leads-count { font-size: 13px; color: var(--muted); }
    .leads-count span { color: var(--text); font-weight: 700; }

    .lead-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      border-left: 3px solid var(--blue);
    }
    .lead-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .lead-name { font-size: 15px; font-weight: 600; color: var(--navy); font-family: 'Montserrat', sans-serif; }
    .lead-time { font-size: 11px; color: var(--muted); }
    .lead-details { display: flex; flex-direction: column; gap: 4px; }
    .lead-detail { font-size: 12px; color: var(--muted); }
    .lead-detail span { color: var(--text); font-weight: 500; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state p { font-size: 13px; margin-top: 8px; }

    /* Loading */
    .loading { position: fixed; inset: 0; background: rgba(13,27,62,0.7); display: none; align-items: center; justify-content: center; z-index: 999; }
    .loading.show { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(0,174,239,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--navy); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 500; color: #fff; z-index: 998; opacity: 0; transition: all .3s; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { border-color: #00b894; color: #00b894; }
    .toast.err { border-color: #f87171; color: #f87171; }
  </style>
</head>

<div class="toast" id="toast"></div>

    url.searchParams.set(k, typeof v === 'object' ? encodeURIComponent(JSON.stringify(v)) : v);
  });
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return res.json();
}

async function doLogin() {
  const user = document.getElementById('inputUser').value.trim();
  const pass = document.getElementById('inputPass').value.trim();
  if (!user || !pass) { showLoginError('Please enter username and password.'); return; }
  showLoading(true);
  try {
    const res = await callAPI({ action: 'login', u: user, p: pass });
    showLoading(false);
    if (res.success) {
      vendorName = res.vendorName;
      document.getElementById('scanVendorLabel').textContent = vendorName;
      document.getElementById('leadsVendorLabel').textContent = vendorName;
      showView('scannerView');
      startScanner();
      loadLeads();
    } else { showLoginError(res.message || 'Login failed.'); }
  } catch(e) { showLoading(false); showLoginError('Connection error. Check API_URL.'); }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

document.getElementById('inputPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

function startScanner() {
  if (scannerRunning) return;
  qrScanner = new Html5Qrcode('reader');
  qrScanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 240, height: 240 } }, onScanSuccess, function() {})
  .then(function() { scannerRunning = true; document.getElementById('scanHint').textContent = 'Point camera at participant QR code'; })
  .catch(function(err) { document.getElementById('scanHint').textContent = 'Camera unavailable. Use manual entry below. (' + err + ')'; });
}

function stopScanner() {
  if (qrScanner && scannerRunning) {
    qrScanner.stop().then(function() { qrScanner.clear(); scannerRunning = false; }).catch(function(){});
  }
}

function onScanSuccess(decodedText) {
  if (qrScanner && scannerRunning) qrScanner.pause();
  document.getElementById('scanHint').textContent = 'Looking up...';
  processId(decodedText);
}

function toggleManual() {
  const row = document.getElementById('manualRow');
  row.classList.toggle('show');
  if (row.classList.contains('show')) document.getElementById('manualId').focus();
}

function lookupManual() {
  const val = document.getElementById('manualId').value.trim();
  if (!val) { showToast('Enter a participant ID', 'err'); return; }
  processId(val);
}

document.getElementById('manualId').addEventListener('keydown', function(e) { if (e.key === 'Enter') lookupManual(); });

async function processId(rawId) {
  let id = rawId.trim();
  try { const u = new URL(rawId); const t = u.searchParams.get('text'); if (t) id = t.trim(); } catch(e) {}
  showLoading(true);
  try {
    const res = await callAPI({ action: 'lookup', id: id });
    showLoading(false);
    if (res.found) { currentParticipant = res.participant; showResultFound(res.participant); }
    else { showResultError(res.message || 'Not found.'); if (qrScanner && scannerRunning) qrScanner.resume(); }
  } catch(e) { showLoading(false); showResultError('Connection error.'); if (qrScanner && scannerRunning) qrScanner.resume(); }
}

function showResultFound(p) {
  document.getElementById('scanHint').textContent = 'Review and save contact';
  const card = document.getElementById('resultCard');
  card.className = 'result-card show success';
  document.getElementById('resultDot').className = 'dot dot-green';
  document.getElementById('resultTitle').textContent = p.name || 'Unknown';
  document.getElementById('resultSub').textContent = p.email || '';
  document.getElementById('resultFields').innerHTML =
    '<div class="field"><div class="field-label">Contact</div><div class="field-value">' + (p.contact||'-') + '</div></div>' +
    '<div class="field"><div class="field-label">Profession</div><div class="field-value">' + (p.profession||'-') + '</div></div>' +
    '<div class="field"><div class="field-label">Department</div><div class="field-value">' + (p.department||'-') + '</div></div>' +
    '<div class="field full"><div class="field-label">Institute</div><div class="field-value">' + (p.institute||'-') + '</div></div>';
  document.getElementById('resultActions').innerHTML =
    '<button class="btn btn-success" onclick="doSave()">Save Contact</button>' +
    '<button class="btn btn-secondary" onclick="dismissResult()">Cancel</button>';
}

function showResultError(msg) {
  const card = document.getElementById('resultCard');
  card.className = 'result-card show error';
  document.getElementById('resultDot').className = 'dot dot-red';
  document.getElementById('resultTitle').textContent = 'Not Found';
  document.getElementById('resultSub').textContent = msg;
  document.getElementById('resultFields').innerHTML = '';
  document.getElementById('resultActions').innerHTML = '<button class="btn btn-secondary" onclick="dismissResult()">Try Again</button>';
  document.getElementById('scanHint').textContent = 'Point camera at participant QR code';
}

function showResultDuplicate(msg) {
  const card = document.getElementById('resultCard');
  card.className = 'result-card show warn';
  document.getElementById('resultDot').className = 'dot dot-yellow';
  document.getElementById('resultTitle').textContent = 'Already Collected';
  document.getElementById('resultSub').textContent = msg;
  document.getElementById('resultFields').innerHTML = '';
  document.getElementById('resultActions').innerHTML = '<button class="btn btn-secondary" onclick="dismissResult()">OK</button>';
}

function dismissResult() {
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('manualId').value = '';
  document.getElementById('scanHint').textContent = 'Point camera at participant QR code';
  currentParticipant = null;
  if (qrScanner && scannerRunning) qrScanner.resume();
}

async function doSave() {
  if (!currentParticipant) return;
  showLoading(true);
  try {
    const res = await callAPI({ action: 'save', vendor: vendorName, data: currentParticipant });
    showLoading(false);
    if (res.success) { dismissResult(); showToast('Contact saved!', 'ok'); loadLeads(); }
    else if (res.duplicate) { showResultDuplicate(res.message); }
    else { showToast(res.message || 'Save failed', 'err'); }
  } catch(e) { showLoading(false); showToast('Save failed. Check connection.', 'err'); }
}

async function loadLeads() {
  try {
    const res = await callAPI({ action: 'leads', vendor: vendorName });
    if (res.success) { allLeads = res.leads; renderLeads(allLeads); updateCount(allLeads.length); }
  } catch(e) {}
}

function renderLeads(leads) {
  document.getElementById('leadsTotal').textContent = leads.length;
  const list = document.getElementById('leadsList');
  if (leads.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.5"><path stroke-linecap="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg><p>No leads yet. Start scanning!</p></div>';
    return;
  }
  list.innerHTML = leads.map(function(l) {
    return '<div class="lead-card"><div class="lead-card-top"><div class="lead-name">' + l.name + '</div><div class="lead-time">' + l.timestamp + '</div></div><div class="lead-details"><div class="lead-detail">Email: <span>' + (l.email||'-') + '</span></div><div class="lead-detail">Contact: <span>' + (l.contact||'-') + '</span></div><div class="lead-detail">Profession: <span>' + (l.profession||'-') + '</span></div><div class="lead-detail">Institute: <span>' + (l.institute||'-') + '</span></div></div></div>';
  }).join('');
}

function updateCount(n) {
  document.getElementById('leadsCount').textContent = n;
  document.getElementById('leadsCount2').textContent = n;
}

function exportCSV() {
  if (allLeads.length === 0) { showToast('No leads to export', 'err'); return; }
  const headers = ['Name','Contact','Email','Profession','Department','Institute','Scanned At'];
  const rows = allLeads.map(function(l) {
    return [l.name,l.contact,l.email,l.profession,l.department,l.institute,l.timestamp]
      .map(function(v) { return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = vendorName.replace(/\s+/g,'_') + '_MYSIR_ASM2026_leads.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('Exported ' + allLeads.length + ' contacts', 'ok');
}

function showTab(tab) {
  if (tab === 'scanner') {
    showView('scannerView');
    if (!scannerRunning) startScanner();
    document.getElementById('tabScanner').classList.add('active');
    document.getElementById('tabLeads').classList.remove('active');
    document.getElementById('tabScanner2').classList.remove('active');
    document.getElementById('tabLeads2').classList.remove('active');
  } else {
    showView('leadsView');
    stopScanner();
    loadLeads();
    document.getElementById('tabLeads').classList.add('active');
    document.getElementById('tabScanner').classList.remove('active');
    document.getElementById('tabLeads2').classList.add('active');
    document.getElementById('tabScanner2').classList.remove('active');
  }
}

function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function doLogout() {
  stopScanner(); vendorName = null; allLeads = []; currentParticipant = null;
  document.getElementById('inputUser').value = '';
  document.getElementById('inputPass').value = '';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('resultCard').className = 'result-card';
  showView('loginView'); updateCount(0);
}

function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
